name: Quality Gate

on:
  push:
    branches: [master]
  pull_request:

jobs:
  message-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm ci --legacy-peer-deps
        working-directory: uniapp
      - run: npm run build:h5
        working-directory: uniapp
