services:
  web:
    image: nginx:1.27-alpine
    container_name: matchmaker-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8095:80"
    volumes:
      - ./dist/index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  web-mini:
    image: nginx:1.27-alpine
    container_name: matchmaker-web-mini
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8096:80"
    volumes:
      - ./uniapp/dist/build/h5:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  web-matchmaker:
    image: nginx:1.27-alpine
    container_name: matchmaker-web-matchmaker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8097:80"
    volumes:
      - ./dist/matchmaker.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  web-admin:
    image: nginx:1.27-alpine
    container_name: matchmaker-web-admin
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8098:80"
    volumes:
      - ./dist/admin.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: ./server
    container_name: matchmaker-api
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-matchmaker}
      PGUSER: ${POSTGRES_USER:-matchmaker}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-matchmaker-dev-secret-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    container_name: matchmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matchmaker}
      POSTGRES_USER: ${POSTGRES_USER:-matchmaker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backup/postgres:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
