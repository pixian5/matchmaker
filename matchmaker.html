<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>缘定传媒人 - 红娘工作台</title>
    <link rel="stylesheet" href="/styles.css?v=__ASSET_VERSION__" />
  </head>
  <body data-role="matchmaker" class="role-matchmaker">
    <div class="app-shell role-only-shell">
      <main class="main-content">
<section class="view active" id="matchmakerView">
          <!-- 红娘登录与注册界面 -->
          <div class="auth-wrapper" id="matchmakerAuthContainer" style="display: none;">
            <div class="auth-card">
              <header class="auth-header">
                <h2>红娘工作台登录</h2>
                <p>请选择已有红娘账号登录，或注册新红娘进入工作台</p>
              </header>
              
              <div class="auth-tabs" role="tablist">
                <button class="auth-tab-btn active" id="mmAuthTabLoginBtn" type="button">已有红娘登录</button>
                <button class="auth-tab-btn" id="mmAuthTabRegisterBtn" type="button">注册新红娘</button>
              </div>

              <!-- 登录面板 -->
              <div class="auth-panel" id="mmAuthLoginPanel">
                <div class="stack-form" style="grid-template-columns: 1fr auto; margin-top: 10px;">
                  <select id="mmLoginSelect" aria-label="选择红娘"></select>
                  <button class="primary-button" id="mmLoginSubmitBtn" type="button" style="min-height: 40px;">一键登录</button>
                </div>
              </div>

              <!-- 注册面板 -->
              <div class="auth-panel" id="mmAuthRegisterPanel" style="display: none;">
                <form id="mmRegisterForm" class="form-grid" style="margin-top: 10px;">
                  <label class="wide">
                    <span>红娘姓名</span>
                    <input name="name" required placeholder="如：李红娘" />
                  </label>
                  <label class="wide">
                    <span>所属机构</span>
                    <select name="agencyId" required id="mmRegisterAgencySelect"></select>
                  </label>
                  <label>
                    <span>手机号</span>
                    <input name="phone" required type="tel" pattern="[0-9]*" placeholder="如：13800138000" />
                  </label>
                  <label>
                    <span>电子邮箱</span>
                    <input name="email" type="email" placeholder="如：matchmaker@mail.com" />
                  </label>
                  <label class="wide">
                    <span>唯一推荐码 (用于客户VIP绑定)</span>
                    <input name="code" required placeholder="如：HM-LILI2" style="text-transform: uppercase;" />
                  </label>
                  <label>
                    <span>登录密码</span>
                    <input name="password" type="password" required minlength="6" autocomplete="new-password" placeholder="至少 6 位" />
                  </label>
                  <label>
                    <span>确认密码</span>
                    <input name="passwordConfirm" type="password" required minlength="6" autocomplete="new-password" placeholder="再次输入密码" />
                  </label>
                  <button class="primary-button wide" type="submit">立即注册并登录</button>
                </form>
              </div>
            </div>
          </div>

          <!-- 红娘工作台主页面 -->
          <div id="matchmakerWorkbench" style="display: none;">
            <div class="toolbar">
              <div>
                <span class="eyebrow">红娘工作台</span>
                <h2 id="matchmakerWelcomeTitle">牵线通知与客户联系</h2>
              </div>
              <button class="ghost-button" id="mmLogoutBtn" type="button" style="width: auto; color: var(--coral); border-color: rgba(220, 107, 92, 0.3); background: rgba(220, 107, 92, 0.05);">退出登录</button>
            </div>
            <div class="workbench-grid">
              <section class="panel">
                <div class="section-title">
                  <h3>应用通知</h3>
                  <span id="notificationCount">0 条待处理</span>
                </div>
                <div id="notificationList" class="request-list"></div>
              </section>
              <section class="panel">
                <div class="section-title">
                  <h3>双方隐藏联系信息</h3>
                  <span>仅红娘可见</span>
                </div>
                <div id="contactPanel" class="contact-panel"></div>
              </section>
              <div id="matchmakerChatThreadList" style="display: none;"></div>
            </div>
          </div>

          <!-- 红娘聊天独立页面 -->
          <div id="matchmakerChatView" style="display: none;">
            <div class="toolbar">
              <button class="ghost-button" id="backFromMmChatBtn" type="button" style="width: auto; color: var(--teal); border-color: rgba(15, 118, 110, 0.3); background: rgba(15, 118, 110, 0.05);">← 返回工作台</button>
              <div>
                <span class="eyebrow">会员聊天</span>
                <h2 id="matchmakerChatTitle">聊天窗口</h2>
              </div>
            </div>
            <span id="matchmakerChatMeta" style="font-size: 13px; color: var(--muted); margin-bottom: 12px; display: block;">请选择一个会话</span>
            <div class="workbench-grid">
              <section class="panel">
                <div class="section-title">
                  <h3>会话列表</h3>
                </div>
                <div id="matchmakerChatThreadList" class="request-list"></div>
              </section>
              <section class="panel" id="matchmakerChatPanel" style="display: flex; flex-direction: column; min-height: 400px;">
                <div id="matchmakerChatEmpty" class="request-card muted" style="flex: 1; display: flex; align-items: center; justify-content: center; margin: 0;">还没有聊天消息。</div>
                <div id="matchmakerChatMessages" class="contact-panel" style="flex: 1; overflow-y: auto; flex-direction: column; gap: 12px; padding: 12px; background: rgba(248, 250, 252, 0.6); border-radius: 12px; border: 1px solid var(--line); margin-bottom: 8px;"></div>
                <form id="matchmakerChatForm" class="stack-form" style="display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: auto;">
                  <input id="matchmakerChatInput" placeholder="给会员发送消息" style="margin-bottom: 0;" />
                  <button class="primary-button" type="submit" style="min-height: 40px; margin-bottom: 0; width: 80px;">发送</button>
                </form>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>



  <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
